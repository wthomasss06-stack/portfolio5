<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Fond sombre -->
    <radialGradient id="bg" cx="40%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d2e1f"/>
      <stop offset="100%" stop-color="#030806"/>
    </radialGradient>
    <!-- Gradient engrenage vert -->
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55ee99"/>
      <stop offset="100%" stop-color="#1a9954"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Bordure verte subtile -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(34,200,100,0.35)" stroke-width="1.2"/>

  <!-- Grille de fond subtile -->
  <g opacity="0.06" stroke="#22c864" stroke-width="0.5">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>

  <!-- ── ENGRENAGE (centré sur 22,34, scale ~0.38 du gear 96px original) ── -->
  <g filter="url(#glow)" transform="translate(4, 8) scale(0.37)">
    <!-- Engrenage extérieur -->
    <path fill="url(#gear)"
      d="M48,8C51,8,53,10,53,13L53,16C56,17,59,18,62,20L65,18C67,15,71,15,74,18L80,24
         C83,27,83,31,80,34L78,37C80,40,81,43,82,46L85,46C89,46,91,49,91,53L91,61
         C91,65,89,68,85,68L82,68C81,71,80,74,78,77L80,80C83,83,83,87,80,90L74,96
         C71,99,67,99,65,96L62,94C59,96,56,97,53,98L53,101C53,105,51,107,48,107L40,107
         C37,107,35,105,35,101L35,98C32,97,29,96,26,94L23,96C21,99,17,99,14,96L8,90
         C5,87,5,83,8,80L10,77C8,74,7,71,6,68L3,68C-1,68,-3,65,-3,61L-3,53
         C-3,49,-1,46,3,46L6,46C7,43,8,40,10,37L8,34C5,31,5,27,8,24L14,18
         C17,15,21,15,23,18L26,20C29,18,32,17,35,16L35,13C35,10,37,8,40,8Z"/>
    <!-- Trou central -->
    <circle cx="44" cy="57" r="23" fill="#050f09"/>
    <!-- Lignes internes -->
    <g filter="url(#glow2)" stroke="#22c864" stroke-linecap="round">
      <line x1="26" y1="57" x2="62" y2="57" stroke-width="2" stroke-dasharray="36" opacity="0.9"/>
      <line x1="44" y1="37" x2="44" y2="77" stroke-width="2" stroke-dasharray="40" opacity="0.9"/>
      <line x1="26" y1="57" x2="26" y2="45" stroke-width="1.5" opacity="0.7"/>
      <line x1="62" y1="57" x2="62" y2="45" stroke-width="1.5" opacity="0.7"/>
      <line x1="26" y1="57" x2="26" y2="69" stroke-width="1.5" opacity="0.7"/>
      <line x1="62" y1="57" x2="62" y2="69" stroke-width="1.5" opacity="0.7"/>
    </g>
    <!-- Points lumineux -->
    <g fill="#66ffaa">
      <circle cx="26" cy="45" r="3.5" opacity="0.9"/>
      <circle cx="62" cy="45" r="3.5" opacity="0.9"/>
      <circle cx="26" cy="69" r="3.5" opacity="0.9"/>
      <circle cx="62" cy="69" r="3.5" opacity="0.9"/>
      <circle cx="44" cy="37" r="3.5" opacity="0.9"/>
      <circle cx="44" cy="77" r="3.5" opacity="0.9"/>
      <!-- Point central -->
      <circle cx="44" cy="57" r="5" opacity="1"/>
    </g>
  </g>

  <!-- ── TEXTE "AKA" ── -->
  <text x="37" y="52"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="13"
    fill="url(#gear)"
    filter="url(#glow)"
    letter-spacing="-0.5">AKA</text>

  <!-- ── TEXTE "Tech" ── -->
  <text x="37" y="62"
    font-family="'Syne', 'Arial', sans-serif"
    font-weight="300"
    font-size="7.5"
    fill="#d0f0e0"
    letter-spacing="1.5">Tech</text>

  <!-- Ligne décorative sous le texte -->
  <line x1="37" y1="64" x2="62" y2="64"
    stroke="url(#gear)" stroke-width="1" opacity="0.6"/>

  <!-- Halo ambient vert en bas à gauche -->
  <circle cx="18" cy="34" r="14" fill="rgba(34,200,100,0.07)"/>
</svg>
